<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Legacy Deep Search</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #2c3e50; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .header { background: #00457c; padding: 20px; text-align: center; border-bottom: 3px solid #f1c40f; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #34495e; background: #2c3e50; }
        .route-badge { background: #f1c40f; color: #000; width: 50px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 900; }
        .details { flex: 1; margin-left: 15px; }
        .occupancy { font-size: 0.75rem; color: #bdc3c7; }
        .time-info { text-align: right; }
        .mins { color: #2ecc71; font-weight: bold; font-size: 1.2rem; }
        .clock { color: #95a5a6; font-size: 0.8rem; display: block; }
        .debug-info { font-size: 0.65rem; color: #7f8c8d; padding: 10px; text-align: center; background: #1c2833; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="stop-title" style="margin:0">Searching...</h2>
        <small id="status">Initializing Feed</small>
    </div>
    <div id="bus-list">
        <div style="padding:40px; text-align:center;">Scanning Auckland Network...</div>
    </div>
    <div id="debug" class="debug-info">Trips Scanned: 0</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274'; // Use 7019 for Britomart to verify code works

    async function deepSearchBuses() {
        const listContainer = document.getElementById('bus-list');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        
        try {
            const response = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];
            let scanCount = 0;

            if (data.response && data.response.entity) {
                scanCount = data.response.entity.length;
                
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu || !tu.stop_time_update) return;

                    const updates = [].concat(tu.stop_time_update);
                    
                    // Deep check: match stop_id as string, number, or padded string
                    const myStop = updates.find(s => 
                        String(s.stop_id).trim() === String(STOP_ID).trim() ||
                        String(s.stop_id).includes(STOP_ID)
                    );

                    if (myStop) {
                        const t = myStop.arrival || myStop.departure;
                        if (t && t.time > now - 300) {
                            found.push({
                                route: tu.trip.route_id.split('-')[0],
                                ts: parseInt(t.time),
                                occ: tu.vehicle ? tu.vehicle.occupancy_status : -1
                            });
                        }
                    }
                });
            }

            debug.innerText = `Trips Scanned: ${scanCount} | Found: ${found.length}`;
            status.innerText = "Live Update Successful";
            document.getElementById('stop-title').innerText = `Stop #${STOP_ID}`;
            
            render(found.sort((a,b) => a.ts - b.ts).slice(0, 5));

        } catch (err) {
            status.innerText = "Connection Error";
            console.error(err);
        }
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div style="padding:40px; text-align:center;">No buses found in feed.<br><small>This happens if buses are > 30 mins away.</small></div>';
            return;
        }

        const labels = ["Empty", "Seats Avail", "Few Seats", "Standing", "Full", "Closed"];
        
        list.innerHTML = buses.map(b => {
            const mins = Math.floor((b.ts - Math.floor(Date.now()/1000)) / 60);
            const time = new Date(b.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            return `
                <div class="bus-row">
                    <div class="route-badge">${b.route}</div>
                    <div class="details">
                        <div style="font-weight:bold">Active Service</div>
                        <div class="occupancy">👥 ${labels[b.occ] || 'Available'}</div>
                    </div>
                    <div class="time-info">
                        <div class="mins">${mins <= 0 ? 'DUE' : mins + 'm'}</div>
                        <div class="clock">${time}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    deepSearchBuses();
    setInterval(deepSearchBuses, 30000);
</script>

</body>
</html>

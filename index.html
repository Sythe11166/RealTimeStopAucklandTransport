<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live Bus Stop</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:80%;
}

th,td{
    border-bottom:1px solid #444;
    padding:12px;
}

th{
    background:#222;
}

.route{
    font-size:22px;
    font-weight:bold;
}

.realtime{
    color:#4caf50;
}

.scheduled{
    color:#ff9800;
}

.error{
    color:red;
}
</style>
</head>

<body>

<h1>Bus Stop 8274</h1>

<div id="error" class="error"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Destination</th>
<th>Arrival</th>
<th>Status</th>
<th>Occupancy</th>
</tr>
</thead>

<tbody id="busTable"></tbody>

</table>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses(){

    const errorBox = document.getElementById("error");
    const table = document.getElementById("busTable");

    errorBox.innerText = "";

    try{

        const response = await fetch(
            `https://api.at.govt.nz/v2/public/realtime/stopdepartures?stopid=${STOP_ID}`,
            {
                headers:{
                    "Ocp-Apim-Subscription-Key": API_KEY
                }
            }
        );

        if(!response.ok){
            throw new Error("API response error: " + response.status);
        }

        const data = await response.json();

        console.log("API DATA:", data);

        table.innerHTML = "";

        const departures = data.response;

        departures.slice(0,10).forEach(bus => {

            let route = bus.routeShortName || "-";
            let destination = bus.destination || "-";
            let realtime = bus.realtime;

            let arrivalText = "";
            let statusText = "";

            if(realtime){

                const arrival = new Date(bus.expectedDepartureTime);
                const now = new Date();

                const minutes = Math.round((arrival - now)/60000);

                arrivalText = minutes + " min";
                statusText = "Live";

            }else{

                const scheduled = new Date(bus.scheduledDepartureTime);

                arrivalText = scheduled.toLocaleTimeString([],{
                    hour:'2-digit',
                    minute:'2-digit'
                });

                statusText = "Scheduled";

            }

            let occupancy = "-";

            if(bus.occupancyStatus){
                occupancy = bus.occupancyStatus;
            }

            const row = `
            <tr>
                <td class="route">${route}</td>
                <td>${destination}</td>
                <td>${arrivalText}</td>
                <td class="${realtime ? 'realtime' : 'scheduled'}">${statusText}</td>
                <td>${occupancy}</td>
            </tr>
            `;

            table.innerHTML += row;

        });

    }catch(err){

        console.error(err);
        errorBox.innerText = "Error loading buses: " + err.message;

    }

}

loadBuses();

setInterval(loadBuses,30000);

</script>

</body>
</html>

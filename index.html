<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live Bus Stop Display</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#board{
    max-width:600px;
    margin:auto;
}

.bus{
    display:flex;
    justify-content:space-between;
    padding:15px;
    margin-bottom:10px;
    background:#222;
    border-radius:8px;
    font-size:20px;
}

.route{
    font-weight:bold;
    font-size:26px;
    color:#00d2ff;
}

.time{
    font-size:24px;
}

.occupancy{
    font-size:16px;
}
</style>
</head>

<body>

<h1>Live Bus Departures</h1>

<div id="board"></div>

<script>

const STOP_ID = "8274-e1c68f23"
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5"

const occupancyText = [
"Empty",
"Many Seats",
"Few Seats",
"Standing",
"Limited Standing",
"Full",
"Not Taking Passengers"
]

async function loadBoard(){

const response = await fetch(
`https://api.at.govt.nz/realtime/legacy/tripupdates`,
{
headers:{
"Ocp-Apim-Subscription-Key":API_KEY
}
})

const data = await response.json()

const board = document.getElementById("board")
board.innerHTML = ""

data.response.entity.forEach(entity=>{

if(!entity.trip_update) return

entity.trip_update.stop_time_update.forEach(stop=>{

if(stop.stop_id !== STOP_ID) return

const route = entity.trip_update.trip.route_id

const arrival = stop.arrival?.time
if(!arrival) return

const mins = Math.round((arrival*1000 - Date.now())/60000)

if(mins < 0) return

const occ = occupancyText[entity.vehicle?.occupancy_status] || "Unknown"

const div = document.createElement("div")
div.className="bus"

div.innerHTML = `
<div class="route">${route}</div>
<div class="time">${mins} min</div>
<div class="occupancy">${occ}</div>
`

board.appendChild(div)

})

})

}

loadBoard()
setInterval(loadBoard,10000)

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 Final Fix</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #00457c; color: white; padding: 15px; text-align: center; }
        .bus-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .error-box { background: #fee; color: #c00; padding: 10px; font-size: 0.8rem; margin: 10px; border-radius: 5px; display: none; }
        .footer { font-size: 0.7rem; color: #888; text-align: center; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h3>STOP 8274</h3></div>
    <div id="error-display" class="error-box"></div>
    <div id="bus-list"><div style="padding:20px; text-align:center;">Connecting to AT...</div></div>
    <div class="footer" id="debug">System Ready</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274-e1c68f23';

    async function fetchData() {
        const list = document.getElementById('bus-list');
        const errorBox = document.getElementById('error-display');
        
        try {
            // We use the subscription-key as a URL parameter to bypass some CORS header issues
            const url = `https://api.at.govt.nz/realtime/legacy/tripupdates?subscription-key=${API_KEY}`;
            
            const res = await fetch(url);
            
            if (!res.ok) throw new Error(`Status: ${res.status}`);
            
            const data = await res.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            data.response.entity.forEach(item => {
                const tu = item.trip_update;
                if (!tu) return;
                
                const updates = [].concat(tu.stop_time_update || []);
                const match = updates.find(s => String(s.stop_id) === STOP_ID);
                
                if (match) {
                    const t = (match.arrival || match.departure).time;
                    if (t > now - 60) {
                        found.push({ route: tu.trip.route_id.split('-')[0], ts: t });
                    }
                }
            });

            errorBox.style.display = 'none';
            if (found.length === 0) {
                list.innerHTML = '<div style="padding:30px; text-align:center; color:#999;">No buses found for this stop yet.</div>';
            } else {
                list.innerHTML = found.sort((a,b) => a.ts - b.ts).map(b => {
                    const m = Math.floor((b.ts - now) / 60);
                    return `<div class="bus-row">
                        <span><strong>${b.route}</strong> (Live)</span>
                        <span style="color:#00875a; font-weight:bold;">${m <= 0 ? 'DUE' : m + 'm'}</span>
                    </div>`;
                }).join('');
            }
        } catch (e) {
            errorBox.style.display = 'block';
            errorBox.innerText = `Connection Failed: ${e.message}. If this is a CORS error, try opening this file in a "local server" or a different browser.`;
        }
    }

    setInterval(fetchData, 20000);
    fetchData();
</script>
</body>
</html>

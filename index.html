<!DOCTYPE html>
<html>
<head>
<title>Bus Stop 8274 Tracker</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

#board{
    width:600px;
    margin:auto;
    margin-top:30px;
}

.bus{
    background:#1e1e1e;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.route{
    font-size:28px;
    font-weight:bold;
}

.time{
    font-size:18px;
}

.meta{
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<h1>Stop 8274 – Next Buses</h1>

<div id="board"></div>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

function minutesAway(arrivalTime){

    let arrival = new Date(arrivalTime);
    let now = new Date();

    let diff = Math.round((arrival-now)/60000);

    if(diff <= 0) return "Due";

    return diff + " min";
}

function occupancyText(status){

    const map = [
        "Empty",
        "Many seats",
        "Few seats",
        "Standing",
        "Limited standing",
        "Full",
        "Not accepting passengers"
    ];

    return map[status] || "Unknown";
}

async function loadStop(){

    const response = await fetch(
        `https://api.at.govt.nz/gtfs/v3/stopdepartures/${STOP_ID}`,
        {
            headers:{
                "Ocp-Apim-Subscription-Key": API_KEY
            }
        }
    );

    const data = await response.json();

    const board = document.getElementById("board");

    board.innerHTML = "";

    let departures = data.response.data.slice(0,4);

    departures.forEach(bus => {

        const div = document.createElement("div");
        div.className = "bus";

        const scheduled = new Date(bus.scheduleDepartureTime)
            .toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

        div.innerHTML = `
        <div class="route">
            ${bus.routeShortName}
        </div>

        <div>
            <div class="time">${minutesAway(bus.expectedDepartureTime)}</div>
            <div class="meta">Scheduled ${scheduled}</div>
        </div>

        <div class="meta">
            ${occupancyText(bus.occupancyStatus)}
        </div>
        `;

        board.appendChild(div);

    });

}

loadStop();

setInterval(loadStop, 15000);

</script>

</body>
</html>

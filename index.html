<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auckland Transport Live Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .tracker-card { max-width: 450px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { background: #00457c; color: white; padding: 20px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .route-badge { background: #212121; color: white; padding: 8px 12px; border-radius: 8px; font-weight: 800; min-width: 50px; text-align: center; font-size: 1.1em; }
        .bus-details { flex-grow: 1; padding: 0 15px; }
        .occupancy { font-size: 0.85em; color: #666; margin-top: 3px; }
        .time-box { text-align: right; min-width: 80px; }
        .live-mins { color: #00875a; font-weight: bold; font-size: 1.2em; }
        .scheduled-time { color: #5e6c84; font-size: 0.9em; }
        .error-msg { color: #d63031; padding: 20px; text-align: center; font-weight: bold; }
        .no-data { padding: 30px; text-align: center; color: #777; }
    </style>
</head>
<body>

<div class="tracker-card">
    <div class="header">
        <h2 id="stop-label" style="margin:0">Bus Stop Tracker</h2>
        <small id="stop-id-display">Loading...</small>
    </div>
    <div id="bus-list">
        <div class="no-data">Initializing connection...</div>
    </div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5'; 
    const STOP_ID = '7019'; // Use your stop number (e.g., 7019, 1316, etc.)

    async function updateTracker() {
        const listContainer = document.getElementById('bus-list');
        document.getElementById('stop-id-display').innerText = `Stop #${STOP_ID}`;

        try {
            // AT API endpoint for Realtime Trip Updates filtered by Stop ID
            const url = `https://api.at.govt.nz/v2/public/realtime/stopupdates?stop_id=${STOP_ID}`;
            
            const response = await fetch(url, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error(`API Error: ${response.status}`);

            const data = await response.json();
            
            // Debugging: If no buses show, check your console (F12) to see the raw data
            console.log("AT Data Received:", data);

            if (!data.response || !data.response.entity || data.response.entity.length === 0) {
                listContainer.innerHTML = '<div class="no-data">No upcoming buses found.<br><small>Buses might be too far away or the service is ended for the day.</small></div>';
                return;
            }

            const now = Math.floor(Date.now() / 1000);
            
            let busData = data.response.entity.map(item => {
                const update = item.trip_update;
                const stopUpdate = update.stop_time_update; 
                
                // Get the time (AT usually sends it in seconds)
                const arrivalTime = stopUpdate.arrival ? stopUpdate.arrival.time : stopUpdate.departure.time;
                const waitSeconds = arrivalTime - now;
                const waitMins = Math.floor(waitSeconds / 60);

                return {
                    route: update.trip.route_id.split('-')[0], // Tries to grab the first part of the ID
                    arrivalTime: new Date(arrivalTime * 1000),
                    minutes: waitMins,
                    occupancy: update.vehicle ? update.vehicle.occupancy_status : -1
                };
            });

            // Sort by soonest and take the top 5
            busData = busData
                .filter(b => b.minutes > -2) // Show buses arriving now or in the future
                .sort((a, b) => a.minutes - b.minutes)
                .slice(0, 5);

            renderBuses(busData);

        } catch (err) {
            console.error(err);
            listContainer.innerHTML = `<div class="error-msg">Failed to load data.<br><small>${err.message}</small></div>`;
        }
    }

    function getOccupancyLabel(status) {
        const map = {
            0: "Many seats", 1: "Seats available", 2: "Few seats",
            3: "Standing only", 4: "Full", 5: "Not Boarding"
        };
        return map[status] || "No data";
    }

    function renderBuses(buses) {
        const listContainer = document.getElementById('bus-list');
        listContainer.innerHTML = '';

        buses.forEach(bus => {
            const isLive = bus.minutes < 30; // Consider "Live" if within 30 mins
            const timeDisplay = bus.arrivalTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            const row = document.createElement('div');
            row.className = 'bus-row';
            row.innerHTML = `
                <div class="route-badge">${bus.route}</div>
                <div class="bus-details">
                    <strong>Towards City/Destination</strong>
                    <div class="occupancy">👥 ${getOccupancyLabel(bus.occupancy)}</div>
                </div>
                <div class="time-box">
                    <div class="live-mins">${isLive && bus.minutes >= 0 ? bus.minutes + 'm' : ''}</div>
                    <div class="scheduled-time">${timeDisplay}</div>
                </div>
            `;
            listContainer.appendChild(row);
        });
    }

    // Run once on load
    updateTracker();
    // Refresh every 30 seconds
    setInterval(updateTracker, 30000);
</script>

</body>
</html>

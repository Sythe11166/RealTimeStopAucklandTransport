<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live Bus Stop</title>
<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}
h1{
    margin-top:20px;
}
table{
    margin:auto;
    border-collapse:collapse;
    width:80%;
}
th,td{
    border-bottom:1px solid #444;
    padding:12px;
}
th{
    background:#222;
}
.route{
    font-size:22px;
    font-weight:bold;
}
.realtime{ color:#4caf50; }
.scheduled{ color:#ff9800; }
.error{ color:red; }
</style>
</head>
<body>
<h1>Bus Stop 8274</h1>
<div id="error" class="error"></div>
<table>
<thead>
<tr>
<th>Route</th>
<th>Destination</th>
<th>Arrival</th>
<th>Scheduled</th>
<th>Occupancy</th>
</tr>
</thead>
<tbody id="busTable"></tbody>
</table>

<script>
async function loadBuses(){
    const table = document.getElementById("busTable");
    const errorBox = document.getElementById("error");
    errorBox.innerText = "";
    try{
        const res = await fetch("/api/buses");
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        table.innerHTML = "";
        data.arrivals.sort((a,b)=>a.arrival.replace(" min","") - b.arrival.replace(" min",""))
                     .forEach(bus=>{
            const row = `
                <tr>
                    <td class="route">${bus.route}</td>
                    <td>${bus.destination}</td>
                    <td class="realtime">${bus.arrival}</td>
                    <td class="scheduled">${bus.scheduledTime}</td>
                    <td>${bus.occupancy}</td>
                </tr>`;
            table.innerHTML += row;
        });
    }catch(err){
        console.error(err);
        errorBox.innerText = "Error loading buses: "+err.message;
    }
}

loadBuses();
setInterval(loadBuses,30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>24B/24R Route Debugger</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; line-height: 1.4; }
        .bus-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #111; }
        .highlight { color: #fff; background: #00457c; padding: 2px 5px; }
        .moving { color: #39FF14; }
        .stopped { color: #ff4444; }
        #header { position: sticky; top: 0; background: #000; padding-bottom: 10px; border-bottom: 1px solid #0f0; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="header">
    <h2>DEBUGGING ROUTE 24B/24R</h2>
    <div id="stats">Pinging fleet...</div>
</div>

<div id="output"></div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';

    async function debugRoute() {
        const output = document.getElementById('output');
        const stats = document.getElementById('stats');
        
        try {
            // We use VehiclePositions because it shows EVERY active bus regardless of their itinerary
            const url = `https://api.at.govt.nz/realtime/legacy/vehiclepositions?subscription-key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            const vehicles = data.response.entity;
            let found = [];

            vehicles.forEach(ent => {
                const v = ent.vehicle;
                const rid = v.trip.route_id;

                if (rid.includes('24B') || rid.includes('24R')) {
                    found.push({
                        id: v.vehicle.id,
                        route: rid,
                        lat: v.position.latitude,
                        lon: v.position.longitude,
                        status: v.current_status,
                        // AT sometimes includes the last stop they cleared here:
                        lastStop: v.stop_id || "Unknown (In Transit)"
                    });
                }
            });

            stats.innerText = `Active 24-Series Buses found: ${found.length}`;
            
            if (found.length === 0) {
                output.innerHTML = "NO BUSES FOUND ON ROUTE. The route might be down or using different IDs.";
            } else {
                output.innerHTML = found.map(b => `
                    <div class="bus-card">
                        <div><span class="highlight">BUS: ${b.route}</span> (ID: ${b.id})</div>
                        <div>Status: <span class="${b.status === 'IN_TRANSIT' ? 'moving' : 'stopped'}">${b.status}</span></div>
                        <div>Last Stop Cleared: <strong>${b.lastStop}</strong></div>
                        <div>GPS: ${b.lat.toFixed(4)}, ${b.lon.toFixed(4)}</div>
                        <a href="https://www.google.com/maps?q=${b.lat},${b.lon}" target="_blank" style="color:#aaa;">[View on Map]</a>
                    </div>
                `).join('');
            }

        } catch (e) {
            stats.innerText = "Connection Error: " + e.message;
        }
    }

    // Run once immediately
    debugRoute();
    // Refresh every 30 seconds
    setInterval(debugRoute, 30000);
</script>
</body>
</html>

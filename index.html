<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 Network Debugger</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 20px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .route-badge { background: #eee; color: #333; width: 50px; padding: 5px; text-align: center; border-radius: 4px; font-weight: bold; margin-right: 15px; }
        .highlight { background: #e8f5e9; border-left: 5px solid var(--at-green); }
        .footer { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 0.7rem; }
        .empty { padding: 40px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">24B/24R Network Scanner</h2>
        <div style="font-size:0.8rem">Searching for Stop 8274</div>
    </div>
    
    <div id="bus-list">
        <div class="empty">Scanning entire Auckland network...</div>
    </div>

    <div class="footer" id="console">
        Initializing...
    </div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const TARGET_STOP = '8274';

    async function debugScan() {
        const list = document.getElementById('bus-list');
        const consoleLog = document.getElementById('console');
        
        try {
            const res = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            const now = Math.floor(Date.now() / 1000);
            
            let all24s = [];
            let totalBuses = 0;

            if (data.response && data.response.entity) {
                totalBuses = data.response.entity.length;
                
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu) return;

                    const rId = tu.trip.route_id.toUpperCase();
                    // Check if it's a 24B or 24R
                    if (rId.includes('24B') || rId.includes('24R')) {
                        
                        const updates = [].concat(tu.stop_time_update || []);
                        // Check if our stop is in this bus's list
                        const hasOurStop = updates.find(s => String(s.stop_id).trim() === TARGET_STOP);
                        
                        all24s.push({
                            route: rId.split('-')[0],
                            trip: tu.trip.trip_id,
                            isHeadingToUs: !!hasOurStop,
                            stopsCount: updates.length,
                            nextStop: updates[0] ? updates[0].stop_id : 'Unknown'
                        });
                    }
                });
            }

            consoleLog.innerText = `SCAN COMPLETE: ${totalBuses} BUSES FOUND. ${all24s.length} ARE 24B/24R.`;

            if (all24s.length === 0) {
                list.innerHTML = '<div class="empty">Zero 24B/24R buses found in the entire Auckland feed. They might not have started their routes yet.</div>';
            } else {
                list.innerHTML = all24s.map(b => `
                    <div class="bus-row ${b.isHeadingToUs ? 'highlight' : ''}">
                        <div class="route-badge">${b.route}</div>
                        <div style="flex:1">
                            <strong>Trip: ${b.trip.substring(0,10)}...</strong><br>
                            Current Next Stop: ${b.nextStop}<br>
                            ${b.isHeadingToUs ? '<span style="color:green; font-weight:bold;">✓ TRACKING STOP 8274</span>' : '✕ Not approaching 8274 yet'}
                        </div>
                    </div>
                `).join('');
            }

        } catch (e) {
            consoleLog.innerText = "API ERROR: CHECK KEY";
        }
    }

    setInterval(debugScan, 30000);
    debugScan();
</script>
</body>
</html>

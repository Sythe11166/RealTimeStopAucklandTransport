<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 GPS Scanner</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: #2d2d2d; border-radius: 12px; overflow: hidden; border: 1px solid #444; }
        .header { background: var(--at-blue); padding: 15px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #444; background: #333; margin: 5px; border-radius: 8px; }
        .route-badge { background: #fff; color: #000; width: 50px; height: 35px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .details { flex: 1; margin-left: 15px; }
        .dist { color: #39FF14; font-weight: bold; font-family: monospace; }
        .footer { background: #000; padding: 10px; font-size: 0.7rem; color: #888; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h3 style="margin:0">GPS RADAR: STOP 8274</h3>
        <small id="status">Scanning Fleet GPS...</small>
    </div>
    <div id="bus-list"></div>
    <div class="footer" id="debug">Total Fleet: 0</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_LAT = -36.8923; // Approximate Lat for 8274
    const STOP_LON = 174.7441; // Approximate Lon for 8274

    async function scanGPS() {
        try {
            const res = await fetch('https://api.at.govt.nz/realtime/legacy/vehiclepositions', {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            const list = document.getElementById('bus-list');
            const debug = document.getElementById('debug');
            
            let found = [];
            if (data.response && data.response.entity) {
                debug.innerText = `Total Fleet Scanned: ${data.response.entity.length}`;
                
                data.response.entity.forEach(item => {
                    const v = item.vehicle;
                    if (!v || !v.trip) return;

                    // Broad search for any "24" route
                    if (v.trip.route_id.startsWith('24')) {
                        const dist = calculateDist(v.position.latitude, v.position.longitude, STOP_LAT, STOP_LON);
                        
                        // Only show buses within 10km (to filter out those finished for the day)
                        if (dist < 10) {
                            found.push({
                                route: v.trip.route_id.split('-')[0].replace('243','24B').replace('246','24R'),
                                dist: dist,
                                status: v.current_status || "MOVING"
                            });
                        }
                    }
                });
            }

            if (found.length === 0) {
                list.innerHTML = '<div style="padding:40px; text-align:center;">No 24-series GPS pings nearby.</div>';
            } else {
                list.innerHTML = found.sort((a,b) => a.dist - b.dist).map(b => `
                    <div class="bus-row">
                        <div class="route-badge">${b.route}</div>
                        <div class="details">
                            <strong>${b.status.replace(/_/g, ' ')}</strong><br>
                            <small>GPS Verified</small>
                        </div>
                        <div class="dist">${b.dist.toFixed(2)} km</div>
                    </div>
                `).join('');
            }
            document.getElementById('status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    setInterval(scanGPS, 10000);
    scanGPS();
</script>
</body>
</html>

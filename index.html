<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274-e1c68f23"; // Your bus stop

async function loadBuses() {
    const table = document.getElementById("buses");
    const errorDiv = document.getElementById("error");
    table.innerHTML = "";
    errorDiv.innerText = "";

    try {
        const response = await fetch("https://api.at.govt.nz/realtime/legacy/vehiclelocations", {
            headers: { "Ocp-Apim-Subscription-Key": API_KEY }
        });

        if (!response.ok) {
            throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();
        console.log("API response:", data); // Debug log

        const vehicles = Array.isArray(data.vehicleLocations) ? data.vehicleLocations : [];

        // Filter vehicles heading to this stop
        const arrivals = vehicles.filter(v => v.nextStopId === STOP_ID);

        if (arrivals.length === 0) {
            table.innerHTML = `<tr><td colspan="3" style="text-align:center">No upcoming buses</td></tr>`;
            return;
        }

        const now = Date.now();

        arrivals.forEach(v => {
            const route = v.route || "-";

            // predictedArrival in ISO format or timestamp
            const arrivalTime = v.estimatedArrival || v.scheduledArrival;
            if (!arrivalTime) return;

            const depTime = new Date(arrivalTime);
            const minutes = Math.round((depTime - now) / 60000);
            const arrivalText = minutes >= 0 ? `${minutes} min` : "Departed";
            const statusText = v.estimatedArrival ? "Live" : "Scheduled";

            // Optional: occupancy info
            const occupancy = v.occupancy ? ` (${v.occupancy.replace(/_/g, ' ')})` : "";

            const row = `
                <tr>
                    <td class="route">${route}</td>
                    <td>${arrivalText}${occupancy}</td>
                    <td>${statusText}</td>
                </tr>
            `;
            table.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
        errorDiv.innerText = "Error: " + err.message;
        table.innerHTML = `<tr><td colspan="3" style="text-align:center">Unable to load buses</td></tr>`;
    }
}

// Load initially and refresh every 30 seconds
loadBuses();
setInterval(loadBuses, 30000);
</script>

</body>
</html>

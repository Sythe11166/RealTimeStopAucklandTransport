<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";

async function testVehicleLocations() {
    const table = document.getElementById("buses");
    const errorDiv = document.getElementById("error");
    table.innerHTML = "";
    errorDiv.innerText = "";

    try {
        const response = await fetch("https://api.at.govt.nz/realtime/legacy/vehiclelocations", {
            headers: { "Ocp-Apim-Subscription-Key": API_KEY }
        });

        if (!response.ok) {
            throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();
        console.log("Full response:", data);

        const vehicles = Array.isArray(data.response?.entity) ? data.response.entity : [];

        if (vehicles.length === 0) {
            table.innerHTML = `<tr><td colspan="3" style="text-align:center">No vehicles found</td></tr>`;
            return;
        }

        // Show first 10 vehicles for testing
        vehicles.slice(0, 10).forEach(v => {
            const route = v.trip?.routeId || v.route || "-";
            const vehicleId = v.vehicleId || "-";
            const nextStop = v.nextStopId || "-";

            const row = `
                <tr>
                    <td class="route">${route}</td>
                    <td>${vehicleId}</td>
                    <td>${nextStop}</td>
                </tr>
            `;
            table.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
        errorDiv.innerText = "Error: " + err.message;
        table.innerHTML = `<tr><td colspan="3" style="text-align:center">Unable to load vehicles</td></tr>`;
    }
}

testVehicleLocations();
setInterval(testVehicleLocations, 30000);
</script>

</body>
</html>

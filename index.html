<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 Live GPS</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; --at-gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 480px; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 20px; text-align: center; }
        .bus-row { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .route-badge { background: var(--at-blue); color: white; width: 55px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; flex-shrink: 0; }
        .info { flex: 1; margin-left: 15px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 4px; }
        .moving { background: #e8f5e9; color: var(--at-green); }
        .stopped { background: #fff3e0; color: var(--at-gold); }
        .dist { font-weight: 800; color: #333; font-size: 1rem; text-align: right; }
        .footer { background: #333; color: #aaa; padding: 10px; font-size: 0.7rem; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h3 style="margin:0">GPS Direct: Stop 8274</h3>
        <small id="update-time">Connecting to Fleet GPS...</small>
    </div>
    <div id="bus-list"><div style="padding:40px; text-align:center; color:#999;">Scanning all 24B/24R vehicles...</div></div>
    <div class="footer" id="fleet-stats">FLEET SYNC: 0 VEHICLES</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const MY_STOP_ID = '8274';

    async function fetchGPS() {
        const list = document.getElementById('bus-list');
        const stats = document.getElementById('fleet-stats');
        const timeDisp = document.getElementById('update-time');

        try {
            // Using the Vehicle Positions endpoint
            const res = await fetch(`https://api.at.govt.nz/realtime/legacy/vehiclepositions`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            
            let activeBuses = [];
            if (data.response && data.response.entity) {
                stats.innerText = `FLEET SYNC: ${data.response.entity.length} VEHICLES ONLINE`;
                
                data.response.entity.forEach(item => {
                    const v = item.vehicle;
                    if (!v || !v.trip) return;

                    const rId = v.trip.route_id.toUpperCase();
                    if (rId.includes('24B') || rId.includes('24R')) {
                        activeBuses.push({
                            route: rId.split('-')[0],
                            status: v.current_status || 'IN_TRANSIT_TO',
                            stopId: v.stop_id || 'En Route',
                            lastSeen: v.timestamp
                        });
                    }
                });
            }

            timeDisp.innerText = `Live Feed: ${new Date().toLocaleTimeString()}`;
            render(activeBuses);

        } catch (e) {
            timeDisp.innerText = "GPS Connection Offline";
        }
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div style="padding:40px; text-align:center; color:#999;">No 24B/24R buses found with active GPS.<br><small>This is common between scheduled services.</small></div>';
            return;
        }

        list.innerHTML = buses.map(b => {
            const isAtOurStop = String(b.stopId) === MY_STOP_ID;
            const statusLabel = b.status.replace(/_/g, ' ');
            
            return `
                <div class="bus-row" style="${isAtOurStop ? 'background:#e3f2fd; border-left:5px solid #2196f3;' : ''}">
                    <div class="route-badge">${b.route}</div>
                    <div class="info">
                        <strong>${isAtOurStop ? '★ AT YOUR STOP' : 'On Route'}</strong><br>
                        <span class="status-tag ${b.status === 'STOPPED_AT' ? 'stopped' : 'moving'}">${statusLabel}</span>
                    </div>
                    <div class="dist">
                        <small style="display:block; font-size:0.6rem; color:#999;">LAST STOP ID</small>
                        ${b.stopId}
                    </div>
                </div>
            `;
        }).join('');
    }

    setInterval(fetchGPS, 15000);
    fetchGPS();
</script>
</body>
</html>

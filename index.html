<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Bus Stop Tracker</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

table{
    margin:auto;
    margin-top:20px;
    border-collapse:collapse;
    width:600px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #334155;
}

th{
    background:#1e293b;
}

tr:hover{
    background:#1e293b;
}
</style>
</head>

<body>

<h1>Stop 8274 – Live Departures</h1>

<table id="busTable">
<thead>
<tr>
<th>Route</th>
<th>Minutes Away</th>
<th>Scheduled Time</th>
<th>Seats Available</th>
</tr>
</thead>

<tbody>
</tbody>
</table>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses(){

const url =
`https://api.at.govt.nz/realtime/legacy/stopdepartures/${STOP_ID}?subscription-key=${API_KEY}`;

const response = await fetch(url);
const data = await response.json();

const table = document.querySelector("#busTable tbody");
table.innerHTML = "";

const departures = data.response.slice(0,5);

departures.forEach(bus => {

let route = bus.route_short_name;
let scheduled = new Date(bus.stop_time.departure_time);

let minutes =
Math.round((scheduled - new Date()) / 60000);

let occupancy = bus.occupancy_status || "Unknown";

let row = `
<tr>
<td>${route}</td>
<td>${minutes} min</td>
<td>${scheduled.toLocaleTimeString()}</td>
<td>${occupancy}</td>
</tr>
`;

table.innerHTML += row;

});

}

loadBuses();
setInterval(loadBuses,30000);

</script>

</body>
</html>

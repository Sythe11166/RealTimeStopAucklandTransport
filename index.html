<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 Emergency Radar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #eee; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .header { background: #00457c; padding: 15px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #333; }
        .route { background: #fff; color: #000; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-right: 15px; }
        .time { margin-left: auto; color: #39FF14; font-weight: bold; font-size: 1.2rem; }
        .alert { background: #441111; color: #ff9999; padding: 10px; font-size: 0.8rem; text-align: center; border-bottom: 1px solid #662222; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h3 style="margin:0">STOP 8274</h3>
        <small id="sync">System Syncing...</small>
    </div>
    <div class="alert">FRIDAY PEAK: Real-time data may be intermittent due to route detours.</div>
    <div id="bus-list"><div style="padding:40px; text-align:center;">Scanning alternate feed...</div></div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274-e1c68f23';

    async function fetchEmergency() {
        const list = document.getElementById('bus-list');
        const sync = document.getElementById('sync');
        
        try {
            // Switching to the primary real-time endpoint (non-legacy)
            const url = `https://api.at.govt.nz/realtime/tripupdates?subscription-key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            // Standard GTFS-RT structure check
            const entities = data.entity || [];
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            entities.forEach(ent => {
                const tu = ent.trip_update;
                if (!tu) return;

                const rid = tu.trip.route_id;
                // Capture any 24 variant
                if (rid.includes('24B') || rid.includes('24R')) {
                    const match = (tu.stop_time_update || []).find(s => String(s.stop_id) === STOP_ID);
                    if (match) {
                        const t = (match.arrival || match.departure).time;
                        if (t > now - 60) {
                            found.push({ route: rid.split('-')[0], ts: t });
                        }
                    }
                }
            });

            if (found.length === 0) {
                list.innerHTML = '<div style="padding:40px; text-align:center; color:#888;">No buses predicted. If you see a 24 bus, its GPS is currently hidden from the API.</div>';
            } else {
                list.innerHTML = found.sort((a,b) => a.ts - b.ts).map(b => {
                    const m = Math.floor((b.ts - now) / 60);
                    return `<div class="bus-row"><span class="route">${b.route}</span><span>Sandringham Rd</span><span class="time">${m <= 0 ? 'DUE' : m + 'm'}</span></div>`;
                }).join('');
            }
            sync.innerText = "Updated: " + new Date().toLocaleTimeString();

        } catch (e) {
            sync.innerText = "Feed Offline";
            console.error(e);
        }
    }

    setInterval(fetchEmergency, 20000);
    fetchEmergency();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Live Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header { background: #00457c; color: white; padding: 15px; border-radius: 10px 10px 0 0; text-align: center; }
        .bus { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .route { background: #222; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; width: 40px; text-align: center; }
        .live { color: #27ae60; font-weight: bold; }
        .sched { color: #7f8c8d; font-size: 0.9em; }
        .occupancy { font-size: 0.75em; color: #666; }
        .error { color: #c0392b; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div id="stop-num">Stop Tracker</div>
    </div>
    <div id="results">
        <div style="padding:20px; text-align:center;">Loading live data...</div>
    </div>
</div>

<script>
    const API_KEY = '6cb37daf7f5c4feda39bbf640e892074';
    const STOP_ID = '8274'; // Use Britomart (7019) or your stop to test

    async function fetchTracker() {
        const container = document.getElementById('results');
        document.getElementById('stop-num').innerText = `Stop #${STOP_ID}`;

        try {
            // We use tripupdates and filter by stop_id. 
            // Note: Use 'https://api.at.govt.nz/v2/public/realtime/tripupdates'
            const response = await fetch(`https://api.at.govt.nz/v2/public/realtime/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error(`Server returned ${response.status}`);

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            
            // 1. Filter entities that have a stop_time_update matching our STOP_ID
            let foundBuses = [];

            data.response.entity.forEach(entity => {
                if (entity.trip_update && entity.trip_update.stop_time_update) {
                    // AT often returns an array of stop updates for a single trip
                    const stopUpdate = entity.trip_update.stop_time_update.find(s => s.stop_id === STOP_ID);
                    
                    if (stopUpdate) {
                        const arrival = stopUpdate.arrival || stopUpdate.departure;
                        if (arrival && arrival.time > now - 60) {
                            foundBuses.push({
                                route: entity.trip_update.trip.route_id.split('-')[0],
                                time: arrival.time,
                                occupancy: entity.trip_update.vehicle ? entity.trip_update.vehicle.occupancy_status : 'N/A'
                            });
                        }
                    }
                }
            });

            // 2. Sort by time and take top 5
            foundBuses.sort((a, b) => a.time - b.time);
            const top5 = foundBuses.slice(0, 5);

            if (top5.length === 0) {
                container.innerHTML = '<div class="error">No upcoming buses found for this specific stop ID.</div>';
                return;
            }

            // 3. Render
            container.innerHTML = '';
            top5.forEach(bus => {
                const minsAway = Math.floor((bus.time - now) / 60);
                const timeStr = new Date(bus.time * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                container.innerHTML += `
                    <div class="bus">
                        <div>
                            <div class="route">${bus.route}</div>
                            <div class="occupancy">Occupancy: ${getOcc(bus.occupancy)}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="${minsAway < 20 ? 'live' : 'sched'}">${minsAway <= 0 ? 'Due' : minsAway + ' mins'}</div>
                            <div class="sched">${timeStr}</div>
                        </div>
                    </div>
                `;
            });

        } catch (err) {
            container.innerHTML = `<div class="error">Error: ${err.message}<br>Check if your API key is active.</div>`;
        }
    }

    function getOcc(level) {
        const map = ["Empty", "Many Seats", "Few Seats", "Standing Only", "Full", "Not Boarding"];
        return map[level] || "Unknown";
    }

    fetchTracker();
    setInterval(fetchTracker, 30000);
</script>

</body>
</html>

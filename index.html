<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Bus Stop Board</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#0b1320;
    color:white;
}

.header{
    background:#111827;
    padding:20px;
    font-size:28px;
    font-weight:600;
}

.container{
    padding:20px;
}

.busCard{
    display:flex;
    align-items:center;
    justify-content:space-between;

    background:#111827;
    border-radius:12px;

    padding:18px;
    margin-bottom:12px;
}

.route{
    font-size:26px;
    font-weight:bold;
    background:#2563eb;
    padding:10px 18px;
    border-radius:10px;
}

.timeSection{
    text-align:right;
}

.minutes{
    font-size:30px;
    font-weight:bold;
}

.scheduled{
    color:#9ca3af;
}

.occupancy{
    font-size:14px;
    margin-top:4px;
}

.green{color:#22c55e;}
.orange{color:#f59e0b;}
.red{color:#ef4444;}

</style>
</head>

<body>

<div class="header">
Stop 8274 – Live Departures
</div>

<div class="container" id="board"></div>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses(){

const url =
`https://api.at.govt.nz/realtime/legacy/stopdepartures/${STOP_ID}?subscription-key=${API_KEY}`;

const response = await fetch(url);
const data = await response.json();

const board = document.getElementById("board");
board.innerHTML = "";

const buses = data.response.slice(0,5);

buses.forEach(bus => {

const route = bus.route_short_name;

const scheduled = new Date(bus.stop_time.departure_time);

const minutes =
Math.max(0,Math.round((scheduled - new Date())/60000));

const scheduledTime =
scheduled.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

let occupancy = bus.occupancy_status || "Unknown";
let occClass = "";

if(occupancy.includes("many")) occClass="green";
if(occupancy.includes("few")) occClass="orange";
if(occupancy.includes("standing")) occClass="red";

const card = document.createElement("div");
card.className="busCard";

card.innerHTML = `

<div class="route">${route}</div>

<div class="timeSection">
<div class="minutes">${minutes} min</div>
<div class="scheduled">${scheduledTime}</div>
<div class="occupancy ${occClass}">
${occupancy}
</div>
</div>

`;

board.appendChild(card);

});

}

loadBuses();
setInterval(loadBuses,30000);

</script>

</body>
</html>

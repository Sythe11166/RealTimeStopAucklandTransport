<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8274 GPS Deep Scan</title>
    <style>
        body { font-family: monospace; background: #000; color: #39FF14; padding: 20px; }
        .log-entry { border-bottom: 1px solid #222; padding: 8px; margin-bottom: 5px; }
        .found { background: #00457c; color: #fff; font-weight: bold; border-radius: 4px; padding: 4px; }
        .error { color: #ff4444; }
        #status-header { border-bottom: 2px solid #39FF14; padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: #000; }
    </style>
</head>
<body>

<div id="status-header">
    <h2 style="margin:0">DEBUG RADAR: STOP 8274</h2>
    <div id="stats">Checking AT Satellite Feed...</div>
</div>

<div id="log"></div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_8274_LAT = -36.8923; 
    const STOP_8274_LON = 174.7441;

    async function deepScan() {
        const log = document.getElementById('log');
        const stats = document.getElementById('stats');
        
        try {
            // Fetching Vehicle Positions - this is the most reliable "truth"
            const url = `https://api.at.govt.nz/realtime/legacy/vehiclepositions?subscription-key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            // AT API can wrap 'entity' in 'response' or at top level
            const entities = data.entity || (data.response && data.response.entity) || [];
            
            if (entities.length === 0) {
                stats.innerHTML = '<span class="error">FEED EMPTY: No vehicles reporting in Auckland right now.</span>';
                return;
            }

            let html = "";
            let matchCount = 0;

            entities.forEach(ent => {
                const v = ent.vehicle;
                if (!v || !v.trip) return;

                const rId = v.trip.route_id || "Unknown";
                
                // Broad search for ANY 24-related route
                if (rId.includes('24')) {
                    matchCount++;
                    const dist = calculateDist(v.position.latitude, v.position.longitude, STOP_8274_LAT, STOP_8274_LON);
                    
                    html += `
                        <div class="log-entry">
                            <span class="found">MATCH: ${rId}</span> | Bus #${v.vehicle.id}<br>
                            GPS: ${v.position.latitude.toFixed(4)}, ${v.position.longitude.toFixed(4)}<br>
                            Distance to Stop: <strong>${(dist * 1000).toFixed(0)}m</strong><br>
                            Status: ${v.current_status || "IN_TRANSIT"} | At Stop: ${v.stop_id || "Moving"}
                        </div>
                    `;
                }
            });

            stats.innerText = `Scanned ${entities.length} vehicles. Found ${matchCount} on Route 24.`;
            log.innerHTML = matchCount > 0 ? html : "Scanning... No 24B or 24R buses detected in the current feed slice.";

        } catch (e) {
            stats.innerHTML = `<span class="error">CRITICAL ERROR: ${e.message}</span>`;
        }
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    deepScan();
    setInterval(deepScan, 15000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auckland Transport Live Stop Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .tracker-card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #00457c; text-align: center; margin-top: 0; }
        .bus-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .bus-row:last-child { border-bottom: none; }
        .route-no { background: #00457c; color: white; padding: 5px 10px; border-radius: 6px; font-weight: bold; min-width: 45px; text-align: center; }
        .bus-info { flex-grow: 1; margin-left: 15px; }
        .time-info { text-align: right; }
        .minutes { font-size: 1.2em; font-weight: bold; color: #2ecc71; }
        .scheduled { color: #7f8c8d; font-size: 0.9em; }
        .occupancy { font-size: 0.8em; color: #666; margin-top: 4px; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="tracker-card">
    <h2 id="stop-name">Loading Stop...</h2>
    <div id="bus-list" class="loading">Fetching live data...</div>
</div>

<script>
    // CONFIGURATION
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5'; // Replace with your AT Developer Key
    const STOP_ID = '8274-e1c68f23';           // Replace with your specific Auckland Stop ID (e.g., 7019 for Britomart)

    async function fetchTracker() {
        try {
            // 1. Fetch Stop Information (Static)
            // 2. Fetch Real-time Trip Updates
            const response = await fetch(`https://api.at.govt.nz/v2/public/realtime/stopupdates?stop_id=${STOP_ID}`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await response.json();

            if (!data.response || !data.response.entity) {
                document.getElementById('bus-list').innerHTML = "No active buses found for this stop.";
                return;
            }

            const arrivals = data.response.entity
                .map(entity => {
                    const update = entity.trip_update.stop_time_update;
                    const scheduledTime = new Date(update.arrival.time * 1000);
                    const diffMs = scheduledTime - new Date();
                    const diffMins = Math.round(diffMs / 60000);
                    
                    return {
                        route: entity.trip_update.trip.route_id, // Note: You may need to map route_id to Route Number via GTFS Static API
                        minutes: diffMins,
                        timeStr: scheduledTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        isActive: diffMins <= 30 && diffMins >= -1, // Simple logic for "active"
                        // AT provides occupancy as an enum: 0 (Empty) to 6 (Full)
                        occupancy: entity.trip_update.vehicle?.occupancy_status || "Unknown"
                    };
                })
                .filter(bus => bus.minutes >= -1) // Remove buses that already passed
                .sort((a, b) => a.minutes - b.minutes)
                .slice(0, 5);

            renderBuses(arrivals);
        } catch (error) {
            document.getElementById('bus-list').innerHTML = "Error loading data. Check API Key.";
        }
    }

    function getOccupancyText(status) {
        const levels = {
            0: "Empty", 1: "Many seats available", 2: "Few seats available", 
            3: "Standing room only", 4: "Crushed standing room", 5: "Full", 6: "Not accepting passengers"
        };
        return levels[status] || "Occupancy unavailable";
    }

    function renderBuses(buses) {
        const list = document.getElementById('bus-list');
        list.innerHTML = '';
        document.getElementById('stop-name').innerText = `Stop #${STOP_ID}`;

        buses.forEach(bus => {
            const div = document.createElement('div');
            div.className = 'bus-row';
            div.innerHTML = `
                <div class="route-no">${bus.route}</div>
                <div class="bus-info">
                    <strong>To City Centre</strong>
                    <div class="occupancy">👥 ${getOccupancyText(bus.occupancy)}</div>
                </div>
                <div class="time-info">
                    <div class="${bus.isActive ? 'minutes' : 'scheduled'}">
                        ${bus.isActive ? bus.minutes + ' min' : bus.timeStr}
                    </div>
                    ${bus.isActive ? `<div class="scheduled">${bus.timeStr}</div>` : ''}
                </div>
            `;
            list.appendChild(div);
        });
    }

    fetchTracker();
    setInterval(fetchTracker, 30000); // Refresh every 30 seconds
</script>

</body>
</html>

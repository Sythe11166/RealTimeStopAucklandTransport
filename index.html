<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8274 Live Scan</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; --at-light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; display: flex; justify-content: center; padding: 20px; }
        
        .card { width: 100%; max-width: 450px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--at-blue); color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        
        .bus-row { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .bus-row:hover { background: var(--at-light); }

        .route-badge { 
            background: var(--at-blue); color: white; width: 65px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-weight: 800; font-size: 1.2rem; flex-shrink: 0; 
        }

        .details { flex: 1; margin-left: 15px; }
        .service-info { font-weight: 600; color: #333; }
        
        .time-info { text-align: right; }
        .mins { color: var(--at-green); font-weight: 800; font-size: 1.4rem; display: block; }
        
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .footer { background: #f1f3f5; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 0.75rem; color: #6c757d; font-weight: bold; border-top: 1px solid #dee2e6; }
        .empty { padding: 60px; text-align: center; color: #adb5bd; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>STOP 8274</h2>
        <div id="status" style="font-size: 0.8rem; margin-top: 5px; opacity: 0.8;">Initialising Scanner...</div>
    </div>
    
    <div id="bus-list">
        <div class="empty">Waiting for network sync...</div>
    </div>

    <div class="footer">
        <span>NETWORK TRAFFIC</span>
        <span id="scan-count">0 BUSES SCANNED</span>
    </div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const MY_STOP = '8274';

    async function runDeepScan() {
        const listContainer = document.getElementById('bus-list');
        const scanDisplay = document.getElementById('scan-count');
        const statusDisplay = document.getElementById('status');
        
        try {
            const response = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error("API Connection Error");

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            if (data.response && data.response.entity) {
                const totalEntities = data.response.entity.length;
                scanDisplay.innerText = `${totalEntities.toLocaleString()} BUSES SCANNED`;
                
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu || !tu.trip) return;

                    // Strictly filter for 24B or 24R
                    const routeId = tu.trip.route_id.toUpperCase();
                    if (routeId.includes('24B') || routeId.includes('24R')) {
                        
                        const updates = [].concat(tu.stop_time_update || []);
                        const match = updates.find(s => String(s.stop_id).trim() === MY_STOP);

                        if (match) {
                            const timeVal = (match.arrival && match.arrival.time) || (match.departure && match.departure.time);
                            if (timeVal && timeVal > now - 60) {
                                found.push({
                                    route: routeId.split('-')[0],
                                    ts: parseInt(timeVal)
                                });
                            }
                        }
                    }
                });
            }

            statusDisplay.innerText = `Updated: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
            render(found.sort((a,b) => a.ts - b.ts).slice(0, 5));

        } catch (err) {
            statusDisplay.innerText = "Connection Failed";
            console.error(err);
        }
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div class="empty">No 24B/24R buses currently<br>found in the live network feed.</div>';
            return;
        }

        list.innerHTML = buses.map(b => {
            const diff = b.ts - Math.floor(Date.now()/1000);
            const m = Math.floor(diff / 60);
            const time = new Date(b.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            return `
                <div class="bus-row">
                    <div class="route-badge">${b.route}</div>
                    <div class="details">
                        <div class="service-info">Live Tracking Active</div>
                        <div style="font-size: 0.8rem; color: #888;">Sandringham Rd</div>
                    </div>
                    <div class="time-info">
                        <span class="mins ${m < 3 ? 'pulse' : ''}">${m <= 0 ? 'DUE' : m + 'm'}</span>
                        <span style="font-size: 0.8rem; color: #999;">${time}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Run every 20 seconds for high accuracy
    runDeepScan();
    setInterval(runDeepScan, 20000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop 8274: 24B & 24R</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 25px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #eee; }
        .route-badge { background: var(--at-blue); color: white; width: 65px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 1.2rem; }
        .details { flex: 1; margin-left: 15px; }
        .time-info { text-align: right; }
        .mins { color: var(--at-green); font-weight: 800; font-size: 1.4rem; }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .empty { padding: 50px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">Stop 8274</h2>
        <small id="status">Scanning for 24B & 24R...</small>
    </div>
    <div id="bus-list"><div class="empty">Searching Auckland network...</div></div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const MY_STOP = '8274';

    async function scanNetwork() {
        const list = document.getElementById('bus-list');
        const status = document.getElementById('status');
        
        try {
            const res = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            if (data.response && data.response.entity) {
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu || !tu.trip) return;

                    // Match Route 24B or 24R
                    const rId = tu.trip.route_id.toUpperCase();
                    if (rId.includes('24B') || rId.includes('24R')) {
                        
                        // Scan ALL stop updates for this bus
                        const updates = [].concat(tu.stop_time_update || []);
                        const match = updates.find(s => String(s.stop_id).trim() === MY_STOP);

                        if (match) {
                            const timeObj = match.arrival || match.departure;
                            if (timeObj && timeObj.time > now - 60) {
                                found.push({
                                    route: rId.split('-')[0],
                                    ts: parseInt(timeObj.time)
                                });
                            }
                        }
                    }
                });
            }

            status.innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;
            render(found.sort((a,b) => a.ts - b.ts).slice(0, 5));

        } catch (e) {
            status.innerText = "Connection Error";
        }
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div class="empty">No 24B/24R buses currently<br>reported on approach to 8274.</div>';
            return;
        }

        list.innerHTML = buses.map(b => {
            const m = Math.floor((b.ts - Math.floor(Date.now()/1000)) / 60);
            const time = new Date(b.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            return `
                <div class="bus-row">
                    <div class="route-badge">${b.route}</div>
                    <div class="details"><strong>Live Approach</strong><br><small>Sandringham Rd</small></div>
                    <div class="time-info">
                        <span class="mins ${m < 3 ? 'pulse' : ''}">${m <= 0 ? 'DUE' : m + 'm'}</span>
                        <span style="display:block; font-size:0.8rem; color:#888;">${time}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    setInterval(scanNetwork, 20000);
    scanNetwork();
</script>
</body>
</html>

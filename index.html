<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses() {
    const table = document.getElementById("buses");
    const errorDiv = document.getElementById("error");
    table.innerHTML = "";
    errorDiv.innerText = "";

    try {
        const response = await fetch(
            "https://api.at.govt.nz/realtime/gtfs/v3/trip-updates",
            {
                headers: {
                    "Ocp-Apim-Subscription-Key": API_KEY
                }
            }
        );

        if (!response.ok) {
            throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();
        console.log("API response:", data); // <-- Debug: see full response

        const entities = Array.isArray(data.entity) ? data.entity : [];

        if (entities.length === 0) {
            table.innerHTML = `<tr><td colspan="3" style="text-align:center">No upcoming buses</td></tr>`;
            return;
        }

        const now = Math.floor(Date.now() / 1000);
        let hasBuses = false;

        entities.forEach(entity => {
            const tripUpdate = entity.trip_update;
            if (!tripUpdate) return;

            const stopUpdates = Array.isArray(tripUpdate.stop_time_update) ? tripUpdate.stop_time_update : [];
            stopUpdates.forEach(stop => {
                if (stop.stop_id !== STOP_ID) return;

                const arrival = stop.arrival?.time;
                const scheduled = stop.schedule?.time;
                if (!arrival && !scheduled) return;

                const minutes = arrival ? Math.round((arrival - now) / 60) : null;
                const arrivalText = minutes !== null ? `${minutes} min` : scheduled ? new Date(scheduled * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "-";
                const statusText = minutes !== null ? "Live" : "Scheduled";

                const row = `
                    <tr>
                        <td class="route">${tripUpdate.trip.route_id || "-"}</td>
                        <td>${arrivalText}</td>
                        <td>${statusText}</td>
                    </tr>
                `;
                table.innerHTML += row;
                hasBuses = true;
            });
        });

        if (!hasBuses) {
            table.innerHTML = `<tr><td colspan="3" style="text-align:center">No upcoming buses</td></tr>`;
        }

    } catch (err) {
        console.error(err);
        errorDiv.innerText = "Error: " + err.message;
        table.innerHTML = `<tr><td colspan="3" style="text-align:center">Unable to load buses</td></tr>`;
    }
}

loadBuses();
setInterval(loadBuses, 30000);
</script>

</body>
</html>

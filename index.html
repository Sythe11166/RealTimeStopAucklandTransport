<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ENDPOINT = "https://api.at.govt.nz/gtfs/v3/stops/8274-e1c68f23";

async function loadBuses() {
    const table = document.getElementById("buses");
    const errorDiv = document.getElementById("error");
    table.innerHTML = "";
    errorDiv.innerText = "";

    try {
        const response = await fetch(STOP_ENDPOINT, {
            headers: {
                "Ocp-Apim-Subscription-Key": API_KEY
            }
        });

        if (!response.ok) {
            throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();
        console.log("API response:", data); // Debug log

        const departures = Array.isArray(data.data?.departures) ? data.data.departures : [];

        if (departures.length === 0) {
            table.innerHTML = `<tr><td colspan="3" style="text-align:center">No upcoming buses</td></tr>`;
            return;
        }

        const now = new Date();

        departures.forEach(dep => {
            const route = dep.route_id || "-";

            // Use predicted departure if available, else scheduled
            const depTimeStr = dep.predicted_departure_utc || dep.scheduled_departure_utc;
            if (!depTimeStr) return;

            const depTime = new Date(depTimeStr);
            const minutes = Math.round((depTime - now) / 60000);
            const arrivalText = minutes >= 0 ? `${minutes} min` : "Departed";
            const statusText = dep.predicted_departure_utc ? "Live" : "Scheduled";

            // Optional: occupancy if available
            const occupancy = dep.occupancy ? ` (${dep.occupancy.replace(/_/g,' ')})` : "";

            const row = `
                <tr>
                    <td class="route">${route}</td>
                    <td>${arrivalText}${occupancy}</td>
                    <td>${statusText}</td>
                </tr>
            `;
            table.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
        errorDiv.innerText = "Error: " + err.message;
        table.innerHTML = `<tr><td colspan="3" style="text-align:center">Unable to load buses</td></tr>`;
    }
}

// Load initially and refresh every 30s
loadBuses();
setInterval(loadBuses, 30000);
</script>

</body>
</html>

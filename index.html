<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Debug</title>
<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    padding:20px;
}
pre{
    background:#222;
    padding:10px;
    overflow:auto;
}
</style>
</head>

<body>

<h2>AT Bus Stop Debug</h2>

<div id="status">Loading...</div>
<pre id="output"></pre>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function testAPI(){

    try{

        const url = `https://api.at.govt.nz/realtime/legacy/stopdepartures/${STOP_ID}`;

        const response = await fetch(url,{
            headers:{
                "Ocp-Apim-Subscription-Key": API_KEY
            }
        });

        document.getElementById("status").innerText =
            "HTTP Status: " + response.status;

        const text = await response.text();

        document.getElementById("output").innerText = text;

    }
    catch(err){
        document.getElementById("status").innerText =
            "Error: " + err.message;
    }

}

testAPI();

</script>

</body>
</html>

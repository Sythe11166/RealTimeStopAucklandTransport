<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>

const entities = data.entity || [];
entities.forEach(entity => {
    if (!entity.trip_update) return;

    const stopUpdates = entity.trip_update.stop_time_update || [];
    stopUpdates.forEach(stop => {
        if (stop.stop_id !== STOP_ID) return;

        const arrival = stop.arrival?.time;
        if (!arrival) return;

        const minutes = Math.round((arrival - now) / 60);
        const row = `
        <tr>
            <td class="route">${entity.trip_update.trip.route_id}</td>
            <td>${minutes} min</td>
            <td>Live</td>
        </tr>
        `;
        table.innerHTML += row;
    });
});

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses(){

    try{

        const response = await fetch(
            "https://api.at.govt.nz/realtime/gtfs/v1/trip-updates",
            {
                headers:{
                    "Ocp-Apim-Subscription-Key": API_KEY
                }
            }
        );

        const data = await response.json();

        const table = document.getElementById("buses");
        table.innerHTML = "";

        const now = Math.floor(Date.now()/1000);
        const data = await response.json();
console.log(data);

        data.entity.forEach(entity => {

            if(!entity.trip_update) return;

            entity.trip_update.stop_time_update.forEach(stop => {

                if(stop.stop_id != STOP_ID) return;

                const arrival = stop.arrival?.time;

                if(!arrival) return;

                const minutes = Math.round((arrival - now)/60);

                const row = `
                <tr>
                    <td class="route">${entity.trip_update.trip.route_id}</td>
                    <td>${minutes} min</td>
                    <td>Live</td>
                </tr>
                `;

                table.innerHTML += row;

            });

        });

    }
    catch(err){

        document.getElementById("error").innerText =
            "Error: " + err.message;

    }

}

loadBuses();
setInterval(loadBuses,30000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live Bus Stop Display</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#board{
max-width:600px;
margin:auto;
}

.bus{
display:flex;
justify-content:space-between;
padding:15px;
margin-bottom:10px;
background:#222;
border-radius:6px;
font-size:22px;
}

.route{
font-weight:bold;
font-size:28px;
color:#00c3ff;
}

.time{
font-size:24px;
}

.occupancy{
font-size:16px;
}
</style>
</head>

<body>

<h1>Live Bus Arrivals</h1>

<div id="board"></div>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5"

const STOP_LAT = -36.8862
const STOP_LON = 174.7651

const occupancy = [
"Empty",
"Many Seats",
"Few Seats",
"Standing Room",
"Limited Standing",
"Full",
"Not Accepting Passengers"
]

function distance(lat1,lon1,lat2,lon2){

const R = 6371
const dLat = (lat2-lat1) * Math.PI/180
const dLon = (lon2-lon1) * Math.PI/180

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2)

const c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R * c
}

async function loadBuses(){

const res = await fetch(
"https://api.at.govt.nz/realtime/legacy/vehiclelocations",
{
headers:{
"Ocp-Apim-Subscription-Key":API_KEY
}
})

const data = await res.json()

const board = document.getElementById("board")
board.innerHTML=""

let buses=[]

data.response.entity.forEach(e=>{

if(!e.vehicle) return

const v = e.vehicle

if(!v.position) return

const d = distance(
STOP_LAT,
STOP_LON,
v.position.latitude,
v.position.longitude
)

if(d > 5) return

const speed = v.position.speed || 30

const eta = Math.round((d / speed) * 60)

buses.push({
route:v.trip.route_id,
eta:eta,
occupancy:occupancy[v.occupancy_status] || "Unknown"
})

})

buses.sort((a,b)=>a.eta-b.eta)

buses.slice(0,6).forEach(bus=>{

const div=document.createElement("div")
div.className="bus"

div.innerHTML=`
<div class="route">${bus.route}</div>
<div class="time">${bus.eta} min</div>
<div class="occupancy">${bus.occupancy}</div>
`

board.appendChild(div)

})

}

loadBuses()
setInterval(loadBuses,10000)

</script>

</body>
</html>

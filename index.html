<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8274 API Debugger</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .log-entry { border-bottom: 1px solid #222; padding: 5px; font-size: 12px; }
        .highlight { color: #fff; background: #c00; font-weight: bold; }
        #controls { background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 20px; position: sticky; top: 0; }
    </style>
</head>
<body>

<div id="controls">
    <h3>DEBUG MODE: Auckland Fleet Scan</h3>
    <div id="summary">Initializing...</div>
    <p>Searching for any ID containing "24" or Stop "8274"</p>
</div>

<div id="log-output"></div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const TARGET_STOP = '8274';

    async function runDiagnostic() {
        const output = document.getElementById('log-output');
        const summary = document.getElementById('summary');
        
        try {
            const res = await fetch('https://api.at.govt.nz/realtime/legacy/tripupdates', {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            
            if (!data.response || !data.response.entity) {
                summary.innerText = "ERROR: No entities found in API response.";
                return;
            }

            const entities = data.response.entity;
            let logs = [];
            let matchCount = 0;

            entities.forEach(entity => {
                const tu = entity.trip_update;
                if (!tu) return;

                const rId = tu.trip.route_id;
                const updates = [].concat(tu.stop_time_update || []);
                const hasOurStop = updates.some(s => String(s.stop_id).trim() === TARGET_STOP);
                
                // If it's a 24 series OR it mentions our stop, highlight it!
                if (rId.includes('24') || hasOurStop) {
                    matchCount++;
                    logs.push(`
                        <div class="log-entry highlight">
                            MATCH FOUND! [Route: ${rId}] [Trip: ${tu.trip.trip_id}] 
                            <br>Stops in itinerary: ${updates.map(u => u.stop_id).join(', ')}
                        </div>
                    `);
                } else {
                    // Just log the route ID of everything else so we can see the format
                    logs.push(`<div class="log-entry">Scanning: Route ${rId}</div>`);
                }
            });

            summary.innerText = `Scan Complete. Found ${entities.length} total buses. ${matchCount} match "24" or stop 8274.`;
            output.innerHTML = logs.join('');

        } catch (e) {
            summary.innerText = "CRITICAL ERROR: Check API Key or Console.";
            console.error(e);
        }
    }

    runDiagnostic();
</script>
</body>
</html>

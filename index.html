<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stop 8274 Departures</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#0a0f1c;
    color:white;
}

/* Header */

.header{
    background:#111827;
    padding:22px;
    font-size:30px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
}

.clock{
    font-size:22px;
    color:#9ca3af;
}

/* Container */

.board{
    padding:25px;
}

/* Bus row */

.busRow{
    display:grid;
    grid-template-columns:120px 1fr 140px 160px;
    align-items:center;

    background:#111827;
    border-radius:14px;

    padding:18px;
    margin-bottom:14px;
}

/* Route badge */

.routeBadge{
    font-size:28px;
    font-weight:bold;
    text-align:center;

    padding:12px;
    border-radius:10px;
    background:#2563eb;
}

/* Destination */

.destination{
    font-size:20px;
}

/* Countdown */

.countdown{
    font-size:32px;
    font-weight:bold;
    text-align:right;
}

/* Time */

.time{
    text-align:right;
    color:#9ca3af;
}

/* Occupancy */

.occupancy{
    font-size:14px;
}

.green{color:#22c55e;}
.orange{color:#f59e0b;}
.red{color:#ef4444;}

</style>
</head>

<body>

<div class="header">
<div>Stop 8274 – Live Departures</div>
<div class="clock" id="clock"></div>
</div>

<div class="board" id="board"></div>

<script>

const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";
const STOP_ID = "8274";

async function loadBuses(){

map.spin(true);   
fetch(`https://api.at.govt.nz/realtime/legacy/stopdepartures/8274', {
    method: 'GET',
    headers: {
        'Cache-Control': 'no-cache',
        'Ocp-Apim-Subscription-Key': '109baa24d25a4ad2a9f94f8a52166bd5',
    }
})
        .then(response => response.json())
        .then(response => {
            map.spin(false);
            if (response.message) {
                console.error(response);
                $("#status").text(`Error getting routes: ${response.message}`);
            } else {
                for (var r of response.data) {
                    if (r.attributes.route_type == 712) r.attributes.route_type = 3;
                    routes[r.id] = r.attributes;
                }
            }
            loop();
        })
        .catch(err => {
            map.spin(false);
            console.error(err);
            $("#status").text("Error loading routes.");
        });

        function loop() {
            if (hasLoaded && !document.hasFocus()) {
                console.log("tab unfocused, skipping");
                return;
            }
            hasLoaded = true;

map.spin(true);
const board = document.getElementById("board");
board.innerHTML = "";

const buses = data.response.slice(0,5);

buses.forEach(bus => {

const route = bus.route_short_name;
const destination = bus.trip_headsign || "";

const scheduled = new Date(bus.stop_time.departure_time);

const minutes =
Math.max(0,Math.round((scheduled - new Date())/60000));

const scheduledTime =
scheduled.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

let occupancy = bus.occupancy_status || "Unknown";
let occClass="";

if(occupancy.includes("many")) occClass="green";
if(occupancy.includes("few")) occClass="orange";
if(occupancy.includes("standing")) occClass="red";

const row = document.createElement("div");
row.className="busRow";

row.innerHTML = `

<div class="routeBadge">${route}</div>

<div class="destination">
${destination}
<div class="occupancy ${occClass}">
${occupancy}
</div>
</div>

<div class="countdown">
${minutes} min
</div>

<div class="time">
${scheduledTime}
</div>

`;

board.appendChild(row);

});

}

/* Clock */

function updateClock(){
const now = new Date();
document.getElementById("clock").innerText =
now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

setInterval(updateClock,1000);

/* Refresh buses */

loadBuses();
setInterval(loadBuses,20000);

</script>

</body>
</html>

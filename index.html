<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Legacy Tracker - Fixed</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden; }
        .header { background: #00457c; color: white; padding: 16px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #eee; }
        .route-badge { background: #222; color: white; width: 50px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 1rem; flex-shrink: 0; }
        .details { flex: 1; margin-left: 12px; overflow: hidden; }
        .dest { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .occupancy { font-size: 0.8rem; color: #666; margin-top: 2px; }
        .time-info { text-align: right; margin-left: 10px; }
        .mins { color: #00875a; font-weight: bold; font-size: 1.1rem; display: block; }
        .clock { color: #888; font-size: 0.8rem; }
        .empty { padding: 40px; text-align: center; color: #999; }
        .error { color: #d63031; padding: 20px; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="stop-label" style="margin:0; font-size: 1.2rem;">Bus Tracker</h2>
        <small id="status">Connecting...</small>
    </div>
    <div id="bus-list">
        <div class="empty">Checking for buses...</div>
    </div>
</div>

<script>
    // --- USER CONFIG ---
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274'; // Use 7019 (Britomart) to test
    // -------------------

    async function fetchBuses() {
        const listContainer = document.getElementById('bus-list');
        const statusText = document.getElementById('status');
        document.getElementById('stop-label').innerText = `Stop #${STOP_ID}`;

        try {
            const response = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            let results = [];

            if (data.response && data.response.entity) {
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu || !tu.stop_time_update) return;

                    // FIX: Ensure stop_time_update is treated as an array even if it's a single object
                    const updates = [].concat(tu.stop_time_update);
                    
                    const myStop = updates.find(s => String(s.stop_id) === String(STOP_ID));

                    if (myStop) {
                        const timeObj = myStop.arrival || myStop.departure;
                        if (timeObj && timeObj.time > now - 60) {
                            // Clean the route ID (e.g. "NX1-202..." -> "NX1")
                            let routeName = tu.trip.route_id.split('-')[0];
                            
                            results.push({
                                route: routeName,
                                timestamp: parseInt(timeObj.time),
                                occupancy: tu.vehicle ? tu.vehicle.occupancy_status : -1
                            });
                        }
                    }
                });
            }

            statusText.innerText = `Updated at ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
            render(results.sort((a, b) => a.timestamp - b.timestamp).slice(0, 5));

        } catch (err) {
            statusText.innerText = "Error encountered";
            listContainer.innerHTML = `<div class="error"><strong>Fetch Failed:</strong><br>${err.message}</div>`;
        }
    }

    function getOcc(val) {
        const labels = ["Empty", "Many Seats", "Few Seats", "Standing Only", "Full", "Not Boarding"];
        return (val >= 0 && val <= 5) ? labels[val] : "Seats Available";
    }

    function render(buses) {
        const container = document.getElementById('bus-list');
        if (buses.length === 0) {
            container.innerHTML = '<div class="empty">No upcoming buses found.<br><small>Buses may be outside the tracking range.</small></div>';
            return;
        }

        container.innerHTML = buses.map(bus => {
            const waitMins = Math.floor((bus.timestamp - Math.floor(Date.now()/1000)) / 60);
            const timeStr = new Date(bus.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            return `
                <div class="bus-row">
                    <div class="route-badge">${bus.route}</div>
                    <div class="details">
                        <div class="dest">Scheduled Service</div>
                        <div class="occupancy">👥 ${getOcc(bus.occupancy)}</div>
                    </div>
                    <div class="time-info">
                        <span class="mins">${waitMins <= 0 ? 'Due' : waitMins + 'm'}</span>
                        <span class="clock">${timeStr}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    fetchBuses();
    setInterval(fetchBuses, 30000);
</script>

</body>
</html>

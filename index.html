<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Live Stop Tracker</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.4rem; }
        .bus-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .route-box { background: #222; color: white; width: 50px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
        .details { flex: 1; margin-left: 15px; }
        .occupancy { font-size: 0.8rem; color: #666; margin-top: 3px; }
        .timing { text-align: right; }
        .mins-away { color: var(--at-green); font-weight: bold; font-size: 1.2rem; display: block; }
        .sched-time { color: #888; font-size: 0.85rem; }
        .error { color: #d63031; padding: 20px; text-align: center; font-size: 0.9rem; }
        .loading { padding: 40px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 id="stop-title">Stop Loading...</h1>
        <small id="stop-sub">Real-time Arrivals</small>
    </div>
    <div id="display-area">
        <div class="loading">Connecting to AT Servers...</div>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const API_KEY = '6cb37daf7f5c4feda39bbf640e892074'; 
    const STOP_ID = '8274-e1c68f23'; // e.g., 7019 for Britomart, 1316 for Newmarket
    // ----------------

    async function getATData() {
        const display = document.getElementById('display-area');
        const title = document.getElementById('stop-title');
        title.innerText = `Stop #${STOP_ID}`;

        try {
            // Updated Endpoint: v2/public/realtime/stopupdates
            const url = `https://api.at.govt.nz/v2/public/realtime/stopupdates?stop_id=${STOP_ID}`;
            
            const response = await fetch(url, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (response.status === 404) throw new Error("404: Stop Not Found. Check your API Key permissions.");
            if (!response.ok) throw new Error(`Status: ${response.status}`);

            const data = await response.json();
            
            if (!data.response || !data.response.entity || data.response.entity.length === 0) {
                display.innerHTML = '<div class="loading">No active buses found for this stop.</div>';
                return;
            }

            // Process and Sort
            const now = Math.floor(Date.now() / 1000);
            let arrivals = data.response.entity.map(item => {
                const trip = item.trip_update;
                const stopTime = trip.stop_time_update;
                const timeValue = stopTime.arrival ? stopTime.arrival.time : stopTime.departure.time;
                
                return {
                    // Extract just the route number (e.g., "NX1" from "NX1-202...")
                    route: trip.trip.route_id.split('-')[0], 
                    seconds: timeValue - now,
                    timeStr: new Date(timeValue * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }),
                    occupancy: trip.vehicle ? trip.vehicle.occupancy_status : -1
                };
            })
            .filter(a => a.seconds > -60) // Keep buses arriving now or soon
            .sort((a, b) => a.seconds - b.seconds)
            .slice(0, 5);

            render(arrivals);
        } catch (err) {
            display.innerHTML = `<div class="error"><strong>Error:</strong><br>${err.message}</div>`;
        }
    }

    function getOccText(val) {
        const labels = ["Empty", "Many Seats", "Few Seats", "Standing Only", "Full", "Not Boarding"];
        return labels[val] || "No occupancy data";
    }

    function render(buses) {
        const display = document.getElementById('display-area');
        display.innerHTML = '';

        buses.forEach(bus => {
            const mins = Math.floor(bus.seconds / 60);
            const isLive = mins <= 30;

            const html = `
                <div class="bus-item">
                    <div class="route-box">${bus.route}</div>
                    <div class="details">
                        <strong>Live Service</strong>
                        <div class="occupancy">👥 ${getOccText(bus.occupancy)}</div>
                    </div>
                    <div class="timing">
                        <span class="mins-away">${isLive && mins > 0 ? mins + 'm' : (mins <= 0 ? 'Due' : '')}</span>
                        <span class="sched-time">${bus.timeStr}</span>
                    </div>
                </div>
            `;
            display.innerHTML += html;
        });
    }

    // Run & Set Interval
    getATData();
    setInterval(getATData, 30000);
</script>

</body>
</html>

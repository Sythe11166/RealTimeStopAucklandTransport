<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Stop Board</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="board">

<header>
<h1>Auckland Bus Departures</h1>
<h2 id="stop-name">Loading stop...</h2>
</header>

<table>
<thead>
<tr>
<th>Route</th>
<th>Destination</th>
<th>Departs</th>
</tr>
</thead>

<tbody id="departures">
<tr>
<td colspan="3">Loading...</td>
</tr>
</tbody>
</table>

<footer>
Updated: <span id="updated">--</span>
</footer>

</div>

<script src="script.js"></script>

</body>
</html>

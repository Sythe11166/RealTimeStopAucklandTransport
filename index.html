<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Legacy Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 420px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #00457c; color: white; padding: 20px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .route-badge { background: #222; color: white; width: 55px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; font-size: 1.1rem; }
        .details { flex: 1; margin-left: 15px; }
        .occupancy { font-size: 0.8rem; color: #666; margin-top: 4px; }
        .time-info { text-align: right; }
        .mins { color: #00875a; font-weight: bold; font-size: 1.2rem; display: block; }
        .clock { color: #888; font-size: 0.85rem; }
        .empty { padding: 40px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="stop-label" style="margin:0">Loading Stop...</h2>
        <small id="status">Connecting to Legacy Feed...</small>
    </div>
    <div id="bus-list">
        <div class="empty">Scanning for buses...</div>
    </div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '7019'; // Use 7019 (Britomart) to test if your stop is quiet

    async function fetchLegacyData() {
        const listContainer = document.getElementById('bus-list');
        const statusText = document.getElementById('status');
        document.getElementById('stop-label').innerText = `Stop #${STOP_ID}`;

        try {
            const response = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error(`Fetch Error: ${response.status}`);

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            let results = [];

            // The Legacy feed structure usually places entities under 'response.entity'
            if (data.response && data.response.entity) {
                data.response.entity.forEach(item => {
                    const tripUpdate = item.trip_update;
                    if (!tripUpdate || !tripUpdate.stop_time_update) return;

                    // Search the array of stops in this trip for our specific STOP_ID
                    const myStop = tripUpdate.stop_time_update.find(s => String(s.stop_id) === String(STOP_ID));

                    if (myStop) {
                        const timeData = myStop.arrival || myStop.departure;
                        if (timeData && timeData.time > now - 60) {
                            results.push({
                                // Trims "18-2026..." down to "18"
                                route: tripUpdate.trip.route_id.split('-')[0],
                                timestamp: timeData.time,
                                occupancy: tripUpdate.vehicle ? tripUpdate.vehicle.occupancy_status : -1
                            });
                        }
                    }
                });
            }

            statusText.innerText = "Live Data Updated";
            renderBuses(results.sort((a, b) => a.timestamp - b.timestamp).slice(0, 5));

        } catch (err) {
            statusText.innerText = "Error: " + err.message;
            console.error(err);
        }
    }

    function getOccText(val) {
        const labels = ["Empty", "Many Seats", "Few Seats", "Standing Only", "Full", "Not Boarding"];
        return labels[val] || "Seats Available"; // Default to common status if -1
    }

    function renderBuses(buses) {
        const container = document.getElementById('bus-list');
        if (buses.length === 0) {
            container.innerHTML = '<div class="empty">No upcoming buses found.<br><small>Try Stop 7019 to verify the connection.</small></div>';
            return;
        }

        container.innerHTML = buses.map(bus => {
            const waitMins = Math.floor((bus.timestamp - Math.floor(Date.now()/1000)) / 60);
            const timeStr = new Date(bus.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            return `
                <div class="bus-row">
                    <div class="route-badge">${bus.route}</div>
                    <div class="details">
                        <strong>Towards Destination</strong>
                        <div class="occupancy">👥 ${getOccText(bus.occupancy)}</div>
                    </div>
                    <div class="time-info">
                        <span class="mins">${waitMins <= 0 ? 'Due' : waitMins + 'm'}</span>
                        <span class="clock">${timeStr}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    fetchLegacyData();
    setInterval(fetchLegacyData, 30000); // Refresh every 30s
</script>

</body>
</html>

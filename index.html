<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop 8274: Proximity Tracker</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; --at-red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 20px; text-align: center; }
        .bus-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: all 0.3s ease; }
        .departed { background: #fff1f1; border-left: 5px solid var(--at-red); opacity: 0.7; }
        .route-badge { background: #333; color: white; width: 55px; height: 38px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .details { flex: 1; margin-left: 15px; }
        .time { text-align: right; font-weight: 800; color: var(--at-green); font-size: 1.3rem; }
        .status-msg { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: block; }
        .footer { background: #111; color: #39FF14; padding: 8px; font-family: monospace; font-size: 0.65rem; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">STOP 8274</h2>
        <div id="sync-time" style="font-size:0.8rem; opacity:0.8;">Syncing with AT Fleet...</div>
    </div>
    <div id="bus-list"><div style="padding:40px; text-align:center; color:#999;">Monitoring Sandringham Rd...</div></div>
    <div class="footer" id="debug">Ready</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const MY_STOP = '8274';
    // The 5 stops leading up to 8274
    const PROXIMITY_STOPS = ['8272', '8270', '8268', '8266', '8264'];
    
    let knownTrips = {}; // Track trips to detect when they disappear

    async function update() {
        try {
            const res = await fetch('https://api.at.govt.nz/realtime/legacy/tripupdates', {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            const now = Math.floor(Date.now() / 1000);
            const currentTripIds = [];
            
            if (data.response && data.response.entity) {
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu) return;

                    const rid = tu.trip.route_id;
                    if (!rid.startsWith('24')) return; // Only 24B/R

                    const updates = [].concat(tu.stop_time_update || []);
                    const target = updates.find(s => String(s.stop_id).trim() === MY_STOP);
                    const isNearby = updates.some(s => PROXIMITY_STOPS.includes(String(s.stop_id).trim()));

                    // Only track if it's heading to our stop OR currently in our 5-stop window
                    if (target && isNearby) {
                        const t = (target.arrival || target.departure).time;
                        const tripId = tu.trip.trip_id;
                        currentTripIds.push(tripId);

                        knownTrips[tripId] = {
                            route: rid.split('-')[0].replace('243','24B').replace('246','24R'),
                            ts: t,
                            departed: false
                        };
                    }
                });

                // Mark departed trips: If we knew about it, but it's no longer in the "incoming" list
                Object.keys(knownTrips).forEach(id => {
                    if (!currentTripIds.includes(id) && !knownTrips[id].departed) {
                        knownTrips[id].departed = true;
                        // Remove from view after 30 seconds
                        setTimeout(() => { delete knownTrips[id]; render(); }, 30000);
                    }
                });
            }
            render();
            document.getElementById('sync-time').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function render() {
        const list = document.getElementById('bus-list');
        const trips = Object.values(knownTrips).sort((a,b) => a.ts - b.ts);
        const now = Math.floor(Date.now() / 1000);

        if (trips.length === 0) {
            list.innerHTML = '<div style="padding:40px; text-align:center; color:#999;">No 24-series buses within 5 stops.</div>';
            return;
        }

        list.innerHTML = trips.map(t => {
            const m = Math.floor((t.ts - now) / 60);
            const statusClass = t.departed ? 'bus-row departed' : 'bus-row';
            const statusText = t.departed ? 'DEPARTED' : (m <= 0 ? 'DUE' : m + 'm');
            
            return `
                <div class="${statusClass}">
                    <div class="route-badge">${t.route}</div>
                    <div class="details">
                        <strong>${t.departed ? 'Just Passed' : 'Incoming'}</strong>
                        <span class="status-msg">${t.departed ? 'Stop 8274 Cleared' : 'Sandringham Rd'}</span>
                    </div>
                    <div class="time" style="color: ${t.departed ? '#d32f2f' : '#00875a'}">
                        ${statusText}
                    </div>
                </div>
            `;
        }).join('');
    }

    setInterval(update, 15000);
    update();
</script>
</body>
</html>

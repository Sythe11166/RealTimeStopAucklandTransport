<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>24-Series GPS Debugger</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        .bus-row { border-bottom: 1px solid #333; padding: 10px; margin-bottom: 5px; background: #111; }
        .btn { background: #00457c; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
        .status-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 0.8rem; }
        .in-transit { background: #00457c; color: white; }
        .stopped { background: #c00; color: white; }
    </style>
</head>
<body>

<div style="position: sticky; top:0; background:#000; padding:10px; border-bottom:2px solid #0f0;">
    <h2>24B / 24R FLEET SCAN</h2>
    <button class="btn" onclick="runDebug()">FORCE REFRESH</button>
    <span id="counter" style="margin-left: 15px;">Initializing...</span>
</div>

<div id="log" style="margin-top: 20px;"></div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';

    async function runDebug() {
        const log = document.getElementById('log');
        const counter = document.getElementById('counter');
        log.innerHTML = "Scanning entire fleet GPS...";
        
        try {
            // We use vehiclepositions to find the PHYSICAL bus location
            const url = `https://api.at.govt.nz/realtime/legacy/vehiclepositions?subscription-key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            
            // Safety check for the data structure
            let entities = [];
            if (data.entity) entities = data.entity;
            else if (data.response && data.response.entity) entities = data.response.entity;

            let matches = [];
            entities.forEach(ent => {
                const v = ent.vehicle;
                if (!v || !v.trip) return;

                const rId = v.trip.route_id;
                // Look for anything 24-related
                if (rId.includes('24B') || rId.includes('24R') || rId.startsWith('24')) {
                    matches.push({
                        route: rId.split('-')[0],
                        id: v.vehicle.id,
                        lat: v.position.latitude,
                        lon: v.position.longitude,
                        status: v.current_status || "MOVING",
                        currentStop: v.stop_id || "Between Stops"
                    });
                }
            });

            counter.innerText = `Found ${matches.length} active 24-series buses.`;

            if (matches.length === 0) {
                log.innerHTML = "NO BUSES FOUND. They may have different Route IDs today.";
            } else {
                log.innerHTML = matches.map(m => `
                    <div class="bus-row">
                        <strong style="color:#fff;">[${m.route}]</strong> Bus #${m.id} <br>
                        Status: <span class="status-tag ${m.status === 'STOPPED_AT' ? 'stopped' : 'in-transit'}">${m.status}</span><br>
                        Current/Last Stop: <span style="color:#39FF14;">${m.currentStop}</span><br>
                        Location: ${m.lat.toFixed(5)}, ${m.lon.toFixed(5)} 
                        <a href="https://www.google.com/maps?q=${m.lat},${m.lon}" target="_blank" style="color:#aaa; font-size:0.8rem;">[Map]</a>
                    </div>
                `).join('');
            }

        } catch (e) {
            log.innerHTML = `<span style="color:red">ERROR: ${e.message}</span>`;
            console.error(e);
        }
    }

    runDebug();
    setInterval(runDebug, 30000); // Auto-refresh every 30s
</script>
</body>
</html>

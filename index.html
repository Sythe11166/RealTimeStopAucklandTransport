<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auckland Transport Live Tracker</title>
    <style>
        :root {
            --at-blue: #00457c;
            --at-light-blue: #eef6fc;
            --at-green: #00875a;
            --occupancy-color: #f39c12; /* Vibrant Orange/Gold */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }

        /* Larger Box */
        .card { 
            width: 100%; 
            max-width: 550px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            overflow: hidden; 
            border: 1px solid #ddd;
        }

        .header { 
            background: white; 
            color: var(--at-blue); 
            padding: 25px; 
            text-align: left; 
            border-bottom: 2px solid var(--at-blue);
        }

        .header h2 { margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; }

        .bus-row { 
            display: flex; 
            align-items: center; 
            padding: 20px; 
            border-bottom: 1px solid #f0f0f0; 
            transition: background 0.2s;
        }

        .bus-row:hover { background: var(--at-light-blue); }

        /* Blue Route Numbers */
        .route-badge { 
            background: var(--at-blue); 
            color: white; 
            width: 65px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 1.2rem; 
            flex-shrink: 0; 
        }

        .details { flex: 1; margin-left: 20px; }
        
        .service-label { 
            font-weight: 600; 
            color: #333; 
            font-size: 1.05rem; 
        }

        /* Different Colour Occupancy */
        .occupancy { 
            font-size: 0.9rem; 
            color: var(--occupancy-color); 
            margin-top: 5px; 
            font-weight: 500;
        }

        .time-info { text-align: right; margin-left: 15px; }

        .mins { 
            color: var(--at-green); 
            font-weight: 800; 
            font-size: 1.4rem; 
            display: block; 
        }

        .clock { 
            color: #7f8c8d; 
            font-size: 0.9rem; 
            font-weight: 400;
        }

        .debug-bar { 
            background: #f1f1f1; 
            color: #999; 
            font-size: 0.7rem; 
            padding: 8px 20px; 
            text-align: right; 
            text-transform: uppercase;
        }

        .empty { padding: 60px; text-align: center; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="stop-title">Stop Tracker</h2>
        <span id="update-time" style="font-size: 0.8rem; color: #666;">Waiting for data...</span>
    </div>
    
    <div id="bus-list">
        <div class="empty">Initialising live feed...</div>
    </div>

    <div id="debug" class="debug-bar">Trips Scanned: 0</div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274'; // Use 7019 for Britomart, or your specific stop

    async function updateTracker() {
        const listContainer = document.getElementById('bus-list');
        const updateTime = document.getElementById('update-time');
        const debug = document.getElementById('debug');
        
        try {
            const response = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error("Connection failed");

            const data = await response.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            if (data.response && data.response.entity) {
                debug.innerText = `Trips Scanned: ${data.response.entity.length}`;
                
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu || !tu.stop_time_update) return;

                    const updates = [].concat(tu.stop_time_update);
                    const myStop = updates.find(s => String(s.stop_id).trim() === String(STOP_ID).trim());

                    if (myStop) {
                        const t = myStop.arrival || myStop.departure;
                        if (t && t.time > now - 120) {
                            found.push({
                                route: tu.trip.route_id.split('-')[0],
                                ts: parseInt(t.time),
                                occ: tu.vehicle ? tu.vehicle.occupancy_status : -1
                            });
                        }
                    }
                });
            }

            document.getElementById('stop-title').innerText = `Stop ${STOP_ID}`;
            updateTime.innerText = `Last updated: ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            
            // NEXT 6 SERVICES SLICE
            render(found.sort((a,b) => a.ts - b.ts).slice(0, 6));

        } catch (err) {
            updateTime.innerText = "Offline - Check Connection";
        }
    }

    function getOccLabel(val) {
        const icons = ["󰄰", "󰄱", "󰄲", "󰄳", "󰄴", "󰄵"]; // Fallback icons
        const labels = [
            "Empty", 
            "Many seats available", 
            "Seats available", 
            "Standing room only", 
            "Limited space", 
            "Full"
        ];
        return labels[val] || "Seats available";
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div class="empty">No upcoming services found for this stop.</div>';
            return;
        }

        list.innerHTML = buses.map(b => {
            const mins = Math.floor((b.ts - Math.floor(Date.now()/1000)) / 60);
            const time = new Date(b.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            return `
                <div class="bus-row">
                    <div class="route-badge">${b.route}</div>
                    <div class="details">
                        <div class="service-label">Live Service</div>
                        <div class="occupancy">
                            <span style="font-size:1.1rem">👤</span> ${getOccLabel(b.occ)}
                        </div>
                    </div>
                    <div class="time-info">
                        <div class="mins">${mins <= 0 ? 'DUE' : mins + '<span style="font-size:0.8rem">min</span>'}</div>
                        <div class="clock">${time}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    updateTracker();
    setInterval(updateTracker, 30000);
</script>

</body>
</html>

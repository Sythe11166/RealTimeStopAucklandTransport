<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AT Bus Stop</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #444;
}

.route{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2 style="text-align:center">Bus Stop 8274</h2>

<div id="error" style="color:red;text-align:center"></div>

<table>
<thead>
<tr>
<th>Route</th>
<th>Arrival</th>
<th>Status</th>
</tr>
</thead>

<tbody id="buses"></tbody>

</table>

<script>
const API_KEY = "109baa24d25a4ad2a9f94f8a52166bd5";

async function testVehicleLocations() {
    try {
        const response = await fetch("https://api.at.govt.nz/realtime/legacy/vehiclelocations", {
            headers: { "Ocp-Apim-Subscription-Key": API_KEY }
        });
        const data = await response.json();
        console.log("Raw /vehiclelocations response:", data);
        alert("Check the console for API output"); // quick visual confirmation
    } catch (err) {
        console.error(err);
        alert("API error: " + err.message);
    }
}

testVehicleLocations();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24B & 24R Tracker</title>
    <style>
        :root { --at-blue: #00457c; --at-green: #00875a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--at-blue); color: white; padding: 20px; }
        .search-row { display: flex; gap: 8px; margin-top: 10px; }
        .search-row input { flex: 1; padding: 8px; border-radius: 5px; border: none; }
        .bus-row { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #eee; }
        .route-badge { background: var(--at-blue); color: white; width: 60px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
        .details { flex: 1; margin-left: 15px; }
        .time-info { text-align: right; }
        .mins { color: var(--at-green); font-weight: 800; font-size: 1.3rem; }
        .clock { color: #888; font-size: 0.8rem; display: block; }
        .empty { padding: 40px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div style="font-weight: bold;">24B / 24R Live Tracker</div>
        <div class="search-row">
            <input type="text" id="stopInput" placeholder="Enter Stop ID (e.g. 7019)">
            <button onclick="update()">Update</button>
        </div>
    </div>
    <div id="bus-list"><div class="empty">Enter a stop to scan for 24B/24R...</div></div>
</div>

<script>
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    let myStop = '8274';

    async function update() {
        const input = document.getElementById('stopInput').value;
        if(input) myStop = input.trim();
        
        const list = document.getElementById('bus-list');
        try {
            const res = await fetch(`https://api.at.govt.nz/realtime/legacy/tripupdates`, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });
            const data = await res.json();
            const now = Math.floor(Date.now() / 1000);
            let found = [];

            if (data.response && data.response.entity) {
                data.response.entity.forEach(item => {
                    const tu = item.trip_update;
                    if (!tu) return;

                    // 1. FILTER FOR 24B OR 24R ONLY
                    const rId = tu.trip.route_id.toUpperCase();
                    if (!rId.includes('24B') && !rId.includes('24R')) return;

                    // 2. CHECK IF THIS BUS IS COMING TO OUR STOP
                    const updates = [].concat(tu.stop_time_update || []);
                    const match = updates.find(s => String(s.stop_id) === String(myStop));

                    if (match) {
                        const t = (match.arrival || match.departure).time;
                        if (t > now - 60) {
                            found.push({
                                route: rId.split('-')[0], // Cleans "24B-202..." to "24B"
                                ts: t
                            });
                        }
                    }
                });
            }

            render(found.sort((a,b) => a.ts - b.ts));
        } catch (e) {
            list.innerHTML = `<div class="empty">Connection error. Check API Key.</div>`;
        }
    }

    function render(buses) {
        const list = document.getElementById('bus-list');
        if (buses.length === 0) {
            list.innerHTML = '<div class="empty">No 24B or 24R buses currently tracked for this stop.</div>';
            return;
        }

        list.innerHTML = buses.map(b => {
            const m = Math.floor((b.ts - Math.floor(Date.now()/1000)) / 60);
            const time = new Date(b.ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            return `
                <div class="bus-row">
                    <div class="route-badge">${b.route}</div>
                    <div class="details"><strong>Approaching Stop</strong><br><small>Live Tracking Active</small></div>
                    <div class="time-info">
                        <span class="mins">${m <= 0 ? 'DUE' : m + 'm'}</span>
                        <span class="clock">${time}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    setInterval(update, 20000);
    update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT Full Service Tracker</title>
    <style>
        :root { --at-blue: #00457c; --at-light: #f4f7f9; --at-green: #00875a; --occ-gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; display: flex; justify-content: center; padding: 20px; }
        
        /* Larger, cleaner card */
        .card { width: 100%; max-width: 550px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: white; padding: 25px; border-bottom: 3px solid var(--at-blue); }
        .header h2 { margin: 0; color: var(--at-blue); font-size: 1.7rem; }
        
        .bus-row { display: flex; align-items: center; padding: 22px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .bus-row:hover { background: var(--at-light); }

        /* Blue Route Badges */
        .route-badge { 
            background: var(--at-blue); color: white; width: 70px; height: 48px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 800; font-size: 1.3rem; flex-shrink: 0; 
        }

        .details { flex: 1; margin-left: 20px; }
        .service-type { font-weight: 600; color: #333; font-size: 1.1rem; }
        
        /* High visibility occupancy */
        .occupancy { color: var(--occ-gold); font-size: 0.95rem; font-weight: 600; margin-top: 4px; display: flex; align-items: center; }
        .occ-icon { font-size: 1.2rem; margin-right: 6px; }

        .time-info { text-align: right; min-width: 90px; }
        .mins { color: var(--at-green); font-weight: 800; font-size: 1.5rem; display: block; line-height: 1; }
        .clock { color: #7f8c8d; font-size: 0.95rem; margin-top: 4px; display: block; }
        
        .status-footer { background: #f8f9fa; padding: 10px 20px; font-size: 0.75rem; color: #999; text-align: right; border-top: 1px solid #eee; }
        .loading { padding: 60px; text-align: center; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="stop-name">Auckland Transport</h2>
        <div id="stop-id-sub" style="color:#666; font-size:0.9rem; margin-top:5px;">Stop ID: Loading...</div>
    </div>
    
    <div id="bus-list">
        <div class="loading">Loading full schedule...</div>
    </div>

    <div class="status-footer" id="last-update">Syncing with AT Servers...</div>
</div>

<script>
    // --- SETTINGS ---
    const API_KEY = '109baa24d25a4ad2a9f94f8a52166bd5';
    const STOP_ID = '8274'; // Britomart
    // ----------------

    async function fetchFullSchedule() {
        const listContainer = document.getElementById('bus-list');
        const footer = document.getElementById('last-update');
        
        try {
            // This restricted endpoint returns both Realtime AND Static Schedule
            const url = `https://api.at.govt.nz/v2/public-restricted/departures/${STOP_ID}`;
            
            const response = await fetch(url, {
                headers: { 'Ocp-Apim-Subscription-Key': API_KEY }
            });

            if (!response.ok) throw new Error("API Limit reached or Stop not found");

            const data = await response.json();
            
            // AT's departures endpoint usually nests results in .response
            const departures = data.response;
            if (!departures || departures.length === 0) {
                listContainer.innerHTML = '<div class="loading">No services scheduled for the next 24 hours.</div>';
                return;
            }

            document.getElementById('stop-name').innerText = `Stop ${STOP_ID}`;
            document.getElementById('stop-id-sub').innerText = `Auckland Metro Services`;

            // Sort and take the next 6
            const next6 = departures.slice(0, 6);
            
            listContainer.innerHTML = next6.map(bus => {
                // Calculate time
                const scheduledTime = new Date(bus.ScheduledDepartureTime);
                const actualTime = bus.RealtimeDepartureTime ? new Date(bus.RealtimeDepartureTime) : scheduledTime;
                
                const diffMs = actualTime - new Date();
                const diffMins = Math.round(diffMs / 60000);
                
                // Styling logic
                const isLive = bus.IsRealtime && diffMins <= 30 && diffMins >= 0;
                const timeStr = scheduledTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                
                return `
                    <div class="bus-row">
                        <div class="route-badge">${bus.RouteShortName || bus.RouteVariantName.split(' ')[0]}</div>
                        <div class="details">
                            <div class="service-type">${bus.RouteVariantName || 'Metro Service'}</div>
                            <div class="occupancy">
                                <span class="occ-icon">👤</span> 
                                ${getOccLabel(bus.OccupancyStatus)}
                            </div>
                        </div>
                        <div class="time-info">
                            <span class="mins" style="color: ${isLive ? 'var(--at-green)' : '#7f8c8d'}">
                                ${isLive ? diffMins + '<small style="font-size:0.8rem">m</small>' : timeStr}
                            </span>
                            <span class="clock">${isLive ? timeStr : 'Scheduled'}</span>
                        </div>
                    </div>
                `;
            }).join('');

            footer.innerText = `Last Refreshed: ${new Date().toLocaleTimeString()}`;

        } catch (err) {
            footer.innerText = `Connection Error: ${err.message}`;
        }
    }

    function getOccLabel(status) {
        const labels = {
            "MANY_SEATS_AVAILABLE": "Many seats available",
            "FEW_SEATS_AVAILABLE": "Few seats available",
            "STANDING_ROOM_ONLY": "Standing room only",
            "FULL": "Bus is full",
            "NOT_ACCEPTING_PASSENGERS": "Not boarding"
        };
        return labels[status] || "Seats available";
    }

    fetchFullSchedule();
    setInterval(fetchFullSchedule, 30000); // 30s refresh
</script>

</body>
</html>
